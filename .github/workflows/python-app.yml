name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Testando o código 
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Executar o pytest no projeto 
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
  
  Imagem:
    name: Construindo Imagem para o Docker
    runs-on: ubuntu-latest
    needs: build

	
    steps:
      - name: Docker Login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{secrets.DOCKER_USER}}
          password: ${{secrets.DOCKER_PWD}}

      - name: Configurar o Docker na VM
        uses: docker/build-push-action@v7.1.0
        with: 
          push: true
          tags: |
               isabellemorales/lab8_api_ta:latest
               isabellemorales/lab8_api_ta:${{github.sha}}
    
  DEPLOY:
    name: Implantando na EC2
    runs-on: ubuntu-latest
    needs: Imagem

    steps:
      - name: Deploy na EC2 via SSH 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_KEY}}
          script:  |
            # teste de acesso
            echo "Acesso liberado"
            
            # fazer o pull da imagem dockerhub
            sudo docker pull isabellemorales/lab8_api_ta:latest

            # Parar o app atual remover o cantainer 
            sudo docker stop lab8_api_ta 2>/dev/null || true 
            sudo docker rm lab8_api_ta 2>/dev/null || true 

            #Publicar novo container:
            sudo docker run --name lab8_api_ta -d -p 80:8080 isabellemorales/lab8_api_ta:latest

            # Verificar se publicou 
            sleep 5 
            curl -f http://localhost/health || exit 1 
            echo "Deploy feito com sucesso"

